name: Release new Helm Chart

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    name: Update Helm Chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.1
        with:
          path: current-repo

      - name: Checkout Repository Docs Branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.1
        with:
          path: current-repo-doc
          ref: gh-pages

      - name: Get latest published chart version
        id: get-published-version
        working-directory: current-repo-doc
        run: |
          if [ -f docs/index.yaml ]; then
            CHART_VERSION=$(grep 'version:' docs/index.yaml | head -1 | awk '{print $2}' | tr -d '"')
            echo "Published chart version: $CHART_VERSION"
            echo "latest_version=$CHART_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No index.yaml found, assuming first release"
            echo "latest_version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Get chart version from main
        id: get-current-version
        working-directory: current-repo
        run: |
          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "Chart version on main: $CHART_VERSION"
          echo "current_version=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check-update
        run: |
          if [ "${{ steps.get-published-version.outputs.latest_version }}" = "${{ steps.get-current-version.outputs.current_version }}" ]; then
            echo "No update needed. Chart ${{ steps.get-current-version.outputs.current_version }} already published."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Update needed: ${{ steps.get-published-version.outputs.latest_version }} -> ${{ steps.get-current-version.outputs.current_version }}"
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push updated chart to gh-pages
        if: steps.check-update.outputs.update_needed == 'true'
        working-directory: current-repo
        env:
          HELM_SIGNING_PRIVATE_KEY: ${{ secrets.HELM_SIGNING_PRIVATE_KEY }}
          HELM_SIGNING_KEY_NAME: ${{ secrets.HELM_SIGNING_KEY_NAME }}
          HELM_SIGNING_PASSPHRASE: ${{ secrets.HELM_SIGNING_PASSPHRASE }}
        run: |
          set -ex
          git fetch origin gh-pages
          git switch gh-pages

          mkdir -p docs
          git checkout origin/main -- chart/ README.md docs/index.html
          cp README.md chart/
          if [ -n "$HELM_SIGNING_KEY_NAME" ] && [ -n "$HELM_SIGNING_PRIVATE_KEY" ]; then
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            printf '%s' "$HELM_SIGNING_PRIVATE_KEY" | gpg --batch --import
            # Passphrase file for gpg/helm (avoids gpg-agent TTY in CI)
            printf '%s' "$HELM_SIGNING_PASSPHRASE" > /tmp/helm-passphrase
            # Helm expects legacy keyring format (secring.gpg); GnuPG v2 uses keybox by default
            gpg --export > ~/.gnupg/pubring.gpg
            gpg --batch --pinentry-mode loopback --passphrase-file /tmp/helm-passphrase --export-secret-keys > ~/.gnupg/secring.gpg
            chmod 600 ~/.gnupg/secring.gpg
            gpg --export --armor "$HELM_SIGNING_KEY_NAME" > docs/pgp_keys.asc
            if [ -n "$HELM_SIGNING_PASSPHRASE" ]; then
              helm package --sign --key "$HELM_SIGNING_KEY_NAME" --keyring ~/.gnupg/secring.gpg --passphrase-file /tmp/helm-passphrase chart
            else
              helm package --sign --key "$HELM_SIGNING_KEY_NAME" --keyring ~/.gnupg/secring.gpg chart
            fi
          else
            helm package chart
          fi
          helm repo index . --url https://argoproj-labs.github.io/gitops-promoter-helm/ --merge docs/index.yaml
          echo "Packaged new chart and updated index.yaml"
          ls
          mv gitops-promoter-*.tgz docs/
          for f in gitops-promoter-*.tgz.prov; do [ -f "$f" ] && mv "$f" docs/ && break; done
          mv index.yaml docs/
          ls docs/
          git add -A docs/
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: update gh-pages with latest chart" docs/
          
          git push origin gh-pages --force

      - name: Create and push tag
        if: steps.check-update.outputs.update_needed == 'true'
        working-directory: current-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG_NAME="v${{ steps.get-current-version.outputs.current_version }}"
          echo "Creating tag: $TAG_NAME"
          
          git fetch origin main
          git tag -a "$TAG_NAME" origin/main -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
