apiVersion: promoter.argoproj.io/v1alpha1
kind: ControllerConfiguration
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "promoter.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
  name: promoter-controller-configuration
  namespace: {{ .Release.Namespace }}
spec:
{{- with .Values.controllerConfiguration }}
{{/* Render as JSON: toYaml line-wraps long strings and breaks Promoter Go templates in pullRequest */}}
{{- . | toJson | nindent 2 }}
{{- else }}
{{- fail "controllerConfiguration must be set in values (chart defaults are defined in chart/values.yaml)" }}
{{- end }}
